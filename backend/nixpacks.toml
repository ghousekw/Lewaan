[phases.setup]
nixPkgs = ['php84', 'php84Packages.composer', 'php84Extensions.pdo', 'php84Extensions.pdo_pgsql', 'php84Extensions.mbstring', 'php84Extensions.xml', 'php84Extensions.curl', 'php84Extensions.zip', 'php84Extensions.gd', 'php84Extensions.intl', 'php84Extensions.bcmath']

[phases.install]
cmds = ['composer install --no-dev --optimize-autoloader --no-interaction --prefer-dist']

[phases.build]
cmds = [
    'php artisan view:cache'
]

[start]
cmd = 'php -d upload_max_filesize=20M -d post_max_size=25M -d memory_limit=256M -d max_execution_time=60 artisan config:clear && php -d upload_max_filesize=20M -d post_max_size=25M -d memory_limit=256M -d max_execution_time=60 artisan cache:clear && php -d upload_max_filesize=20M -d post_max_size=25M -d memory_limit=256M -d max_execution_time=60 artisan route:clear && php -d upload_max_filesize=20M -d post_max_size=25M -d memory_limit=256M -d max_execution_time=60 artisan view:clear && php -d upload_max_filesize=20M -d post_max_size=25M -d memory_limit=256M -d max_execution_time=60 artisan migrate --force && php -d upload_max_filesize=20M -d post_max_size=25M -d memory_limit=256M -d max_execution_time=60 artisan serve --host=0.0.0.0 --port=$PORT'
